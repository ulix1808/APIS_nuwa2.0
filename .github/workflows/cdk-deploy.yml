# Despliega el stack CDK en us-east-1 cuando cambia cdk/ o este workflow.
#
# Requisito: secret del repo `AWS_ROLE_TO_ASSUME` = ARN del rol IAM para OIDC de GitHub.
# (En IAM: rol con trust policy a token.actions.githubusercontent.com y permisos CloudFormation + CDK bootstrap.)
#
# Si no usas OIDC, cambia el paso "AWS credentials" por access keys (ver cdk/README.md).

name: Deploy CDK (Nuwa 2.0 API)

on:
  push:
    branches: [main, master]
    paths:
      - "cdk/**"
      - ".github/workflows/cdk-deploy.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cdk/requirements.txt

      - name: AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap + deploy
        id: deploy
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"
          npx --yes aws-cdk@2.170.0 bootstrap aws://$ACCOUNT/${{ env.AWS_REGION }}
          cd cdk
          CDK_DEFAULT_ACCOUNT=$ACCOUNT npx --yes aws-cdk@2.170.0 deploy --all --require-approval never --app "python3 app.py"
